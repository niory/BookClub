# MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3306/bookclub?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username=bookclub_user
spring.datasource.password=bookclub_pass
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=bookclub-super-secret-key-change-in-production-2026
app.jwt.expiration-ms=86400000

# Server
server.port=8080
